<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Coach IA — Connexion requise</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      background: linear-gradient(160deg, #2e1065 0%, #1e0050 100%);
      color: #fff; text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .card { max-width: 360px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .logo { width: 84px; height: 84px; border-radius: 20px; object-fit: cover; box-shadow: 0 0 40px rgba(124,58,237,.5); }
    .emoji { font-size: 56px; line-height: 1; }
    h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
    p { font-size: 15px; line-height: 1.55; color: rgba(255,255,255,.72); }
    button {
      margin-top: 6px; padding: 13px 26px; border: none; border-radius: 14px;
      background: #fff; color: #6d28d9; font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity .15s;
    }
    button:active { opacity: .75; }
    .hint { font-size: 12px; color: rgba(255,255,255,.4); }
  </style>
</head>
<body>
  <div class="card">
    <img src="/robotapp.png" class="logo" alt="Coach IA" onerror="this.outerHTML='<div class=\'emoji\'>📡</div>'" />
    <h1 id="title">Connexion requise</h1>
    <p id="msg">Coach IA a besoin d'une connexion internet pour démarrer. Vérifie ton wifi ou tes données mobiles, puis réessaie.</p>
    <button id="retry" onclick="location.reload()">Réessayer</button>
    <p class="hint" id="hint">La connexion n'est nécessaire qu'au lancement — tes séances en cours restent enregistrées sur l'appareil.</p>
  </div>
  <script>
    // Langue : reprend le choix de l'utilisateur (mémorisé par l'app).
    try {
      if (localStorage.getItem('app_lang') === 'en') {
        document.documentElement.lang = 'en';
        document.getElementById('title').textContent = 'Connection required';
        document.getElementById('msg').textContent = 'Coach IA needs an internet connection to start. Check your wifi or mobile data, then try again.';
        document.getElementById('retry').textContent = 'Try again';
        document.getElementById('hint').textContent = 'Connection is only needed at launch — your in-progress workouts stay saved on your device.';
        document.title = 'Coach IA — Connection required';
      }
    } catch (e) {}
    // Recharge automatiquement dès que la connexion revient.
    window.addEventListener('online', function () { location.reload(); });
  </script>
</body>
</html>
